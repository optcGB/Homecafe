<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"> 
    <title>영광&마리아 홈카페 (HomeCafe)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 1. 기본 설정 */
        body { 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 0; background-color: #f8f9fa; 
            display: flex; height: 100vh; height: 100dvh; /* 아이폰 주소창 대응 */
            overflow: hidden; 
        }

        /* 2. 메뉴 영역 */
        .menu-container { 
            flex: 2; padding: 20px; display: flex; flex-direction: column; 
            height: 100%; box-sizing: border-box; overflow: hidden; min-height: 0;
        }

        .header-title { font-size: 24px; font-weight: bold; color: #4a3b32; margin-bottom: 20px; flex-shrink: 0; }
        
        .category-nav { 
            display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; 
            padding-bottom: 5px; white-space: nowrap; flex-shrink: 0; 
            -webkit-overflow-scrolling: touch; 
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .category-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #ddd; background-color: white; cursor: pointer; font-size: 1rem; color: #555; transition: all 0.2s; }
        .category-btn.active { background-color: #4a3b32; color: white; border-color: #4a3b32; font-weight: bold; }

        .menu-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; overflow-y: auto; flex-grow: 1; 
            padding-bottom: 100px; 
            align-items: start; align-content: start; 
            -webkit-overflow-scrolling: touch;
        }
        .menu-item { background: white; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .menu-img { width: 100%; height: 110px; border-radius: 10px; margin-bottom: 10px; object-fit: cover; background-color: #eee; }
        .menu-name { font-weight: bold; margin-top: 5px; font-size: 1.05em; word-break: keep-all; color: #333; }

        /* 3. 장바구니 영역 */
        .cart-container { 
            flex: 1; background: white; padding: 20px; 
            border-left: 1px solid #ddd; display: flex; flex-direction: column; 
            max-width: 380px; height: 100%; box-sizing: border-box; z-index: 2000;
        }
        
        .mobile-cart-header { display: none; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .mobile-cart-close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 5px; }

        .cart-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #4a3b32; padding-bottom: 10px; flex-shrink: 0; }
        
        .cart-list { flex: 1; overflow-y: auto; margin-bottom: 15px; -webkit-overflow-scrolling: touch; padding-right: 5px; min-height: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; flex-shrink: 0; min-height: 50px; }
        .cart-item-name { font-weight: bold; font-size: 1.0em; display: block; }
        .cart-item-option { font-size: 0.85em; color: #888; margin-top: 4px; display: block; } 
        .cart-btn-remove { background: #ff6b6b; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em; flex-shrink: 0; }

        .total-section { background: #f8f9fa; padding: 15px; border-radius: 10px; flex-shrink: 0; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.1em; font-weight: bold; color: #555; }
        .order-btn { width: 100%; padding: 15px; background-color: #4a3b32; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; font-weight: bold; }

        /* 4. 모바일 플로팅 버튼 */
        .floating-bar {
            display: none; 
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background-color: #4a3b32; color: white;
            padding: 15px 25px; border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 1500;
            justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .floating-badge { background: #ff6b6b; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.9em; margin-left: 5px; }

        /* 팝업 스타일 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-title { font-size: 1.4em; font-weight: bold; margin-bottom: 20px; color: #4a3b32; }
        .option-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .option-btn { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #eee; background: #fff; font-size: 1rem; font-weight: bold; cursor: pointer; color: #aaa; }
        .option-btn.selected { border-color: #4a3b32; color: #4a3b32; background-color: #f8f9fa; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn-close { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: #eee; cursor: pointer; font-weight: bold; }
        .modal-btn-add { flex: 2; padding: 12px; border-radius: 8px; border: none; background: #4a3b32; color: white; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .menu-container { height: 100%; flex: 1; padding-bottom: 0; }
            .cart-container { 
                position: fixed; bottom: 0; left: 0; right: 0;
                height: 85vh; max-width: none;
                border-radius: 20px 20px 0 0; 
                transform: translateY(110%); 
                transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
            }
            .cart-container.open { transform: translateY(0); }
            .mobile-cart-header { display: flex; }
            .cart-title { display: none; }
            .floating-bar { display: flex; padding-bottom: max(15px, env(safe-area-inset-bottom)); }
            .cart-overlay {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.5); z-index: 1900;
            }
            .cart-overlay.show { display: block; }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="header-title">☕ 영광&마리아 홈카페</div>
        <div class="category-nav">
            <button class="category-btn active" onclick="filterMenu('all', this)">전체</button>
            <button class="category-btn" onclick="filterMenu('Coffee', this)">Coffee</button>
            <button class="category-btn" onclick="filterMenu('Non Coffee', this)">Non Coffee</button>
            <button class="category-btn" onclick="filterMenu('Ade', this)">Ade</button>
            <button class="category-btn" onclick="filterMenu('Tea', this)">Tea</button>
            <button class="category-btn" onclick="filterMenu('Smoothie', this)">Smoothie</button>
        </div>
        <div class="menu-grid" id="menu-list"></div>
    </div>

    <div class="cart-overlay" onclick="toggleCart(false)"></div>

    <div class="cart-container" id="cart-drawer">
        <div class="mobile-cart-header">
            <span style="font-size:1.2em; font-weight:bold;">장바구니</span>
            <button class="mobile-cart-close-btn" onclick="toggleCart(false)">✕</button>
        </div>
        <div class="cart-title">장바구니</div> 
        <div class="cart-list" id="cart-list">
             <div style="text-align:center; margin-top:50px; color:#999;">메뉴를 선택해주세요.</div>
        </div>
        <div class="total-section">
            <div class="total-row"><span>총 수량</span><span id="total-count">0잔</span></div>
            <button class="order-btn" onclick="order()">주문 전송</button>
        </div>
    </div>

    <div class="floating-bar" id="floating-bar" onclick="toggleCart(true)">
        <span>장바구니 <span class="floating-badge" id="floating-count">0</span></span>
        <span>주문하기 &gt;</span>
    </div>

    <div class="modal-overlay" id="option-modal">
        <div class="modal-box">
            <div class="modal-title" id="modal-menu-name"></div>
            <div class="option-group" id="modal-options"></div>
            <div class="modal-actions">
                <button class="modal-btn-close" onclick="closeModal()">취소</button>
                <button class="modal-btn-add" id="btn-add-cart" onclick="confirmOption()">담기</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBt4Lu0sLApn-83QMpnfLkjzxBchqcwRzQ",
            authDomain: "homecafe-15677.firebaseapp.com",
            databaseURL: "https://homecafe-15677-default-rtdb.firebaseio.com",
            projectId: "homecafe-15677",
            storageBucket: "homecafe-15677.firebasestorage.app",
            messagingSenderId: "884719230706",
            appId: "1:884719230706:web:2f991c46fbdc8640ee7a6b",
            measurementId: "G-M4W6D9S560"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1458310830180405394/rNYazNBFL71T_pv3PLQQ1uw3SJlYekpPOyOcU1BFzs6YGSNgn0o7mI8p99XtIsNzqhDB";

        const menuData = [
            { category: "Coffee", name: "아메리카노", img: "americano.jpeg", options: ["HOT", "ICE"] },
            { category: "Coffee", name: "카페라떼", img: "cafelatte.avif", options: ["HOT", "ICE"] },
            { category: "Coffee", name: "카페모카", img: "cafemoca.png", options: ["HOT", "ICE"] },
            { category: "Coffee", name: "카푸치노", img: "capu.jpeg", options: ["HOT", "ICE"] },
            { category: "Non Coffee", name: "초당옥수수 라떼", img: "conlatte.jpeg", options: ["HOT", "ICE"] },
            { category: "Non Coffee", name: "핫초코", img: "hotchoco.jpeg", options: ["HOT"] },
            { category: "Ade", name: "자몽에이드", img: "grapefruitade.jpg", options: ["ICE"] },
            { category: "Ade", name: "청귤에이드", img: "greenorageade.jpeg", options: ["ICE"] },
            { category: "Ade", name: "유자에이드", img: "yuzuade.jpg", options: ["ICE"] },
            { category: "Tea", name: "자몽허니 블랙티", img: "grfhoney.jpeg", options: ["HOT", "ICE"] },
            { category: "Tea", name: "녹차", img: "greentee.jpeg", options: ["HOT", "ICE"] },
            { category: "Tea", name: "홍차", img: "hongtee.jpeg", options: ["HOT", "ICE"] },
            { category: "Tea", name: "유자차", img: "yuzutee.jpeg", options: ["HOT", "ICE"] },
            { category: "Smoothie", name: "초당옥수수 스무디", img: "consmoo.jpeg", options: ["ICE"] },
            { category: "Smoothie", name: "초코 스무디", img: "chocosmoo.jpeg", options: ["ICE"] },
            { category: "Smoothie", name: "딸기 요거트 스무디", img: "stsmoo.jpeg", options: ["ICE"] }
        ];

        let cart = [];
        let selectedMenu = null;
        let selectedOption = null;

        renderMenuItems('all');

        function filterMenu(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            renderMenuItems(cat);
        }

        function renderMenuItems(cat) {
            const list = document.getElementById('menu-list');
            list.innerHTML = '';
            const filtered = cat === 'all' ? menuData : menuData.filter(m => m.category === cat);
            filtered.forEach(menu => {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.onclick = () => openModal(menu);
                item.innerHTML = `<img src="${menu.img}" class="menu-img" onerror="this.src='https://via.placeholder.com/150/eee/999?text=No+Image'"><div class="menu-name">${menu.name}</div>`;
                list.appendChild(item);
            });
        }

        function openModal(menu) {
            selectedMenu = menu;
            selectedOption = null;
            document.getElementById('modal-menu-name').innerText = menu.name;
            const container = document.getElementById('modal-options');
            container.innerHTML = '';
            const btnAdd = document.getElementById('btn-add-cart');
            
            menu.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    selectedOption = opt;
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    btnAdd.disabled = false;
                };
                container.appendChild(btn);
            });

            if(menu.options.length === 1) container.firstChild.click(); 
            else { btnAdd.disabled = true; }
            document.getElementById('option-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('option-modal').style.display = 'none'; }
        
        function confirmOption() {
            if(!selectedMenu || !selectedOption) return;
            cart.push({ name: selectedMenu.name, option: selectedOption });
            closeModal();
            renderCart();
            const bar = document.getElementById('floating-bar');
            bar.style.transform = "scale(1.1)";
            setTimeout(() => bar.style.transform = "scale(1)", 200);
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            if(cart.length === 0) {
                list.innerHTML = '<div style="text-align:center; margin-top:50px; color:#999;">장바구니가 비어있습니다.</div>';
                document.getElementById('total-count').innerText = "0잔";
                document.getElementById('floating-count').innerText = "0";
                return;
            }
            cart.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<div><div class="cart-item-name">${item.name}</div><div class="cart-item-option">[${item.option}]</div></div><button class="cart-btn-remove" onclick="removeFromCart(${idx})">삭제</button>`;
                list.appendChild(div);
            });
            document.getElementById('total-count').innerText = cart.length + "잔";
            document.getElementById('floating-count').innerText = cart.length;
        }

        function toggleCart(isOpen) {
            document.getElementById('cart-drawer').classList.toggle('open', isOpen);
            document.querySelector('.cart-overlay').classList.toggle('show', isOpen);
        }

        // 주문 번호 포함 주문 함수
        function order() {
            if (cart.length === 0) { alert("장바구니가 비어있습니다!"); return; }

            const now = new Date();
            const dateKey = now.toISOString().split('T')[0]; // YYYY-MM-DD (매일 자동 초기화 기준)
            const timeString = now.getHours() + ":" + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();

            // Firebase 트랜잭션으로 주문번호 1씩 증가
            const orderCountRef = db.ref('daily_stats/' + dateKey + '/last_number');
            
            orderCountRef.transaction((currentValue) => {
                return (currentValue || 0) + 1;
            }, (error, committed, snapshot) => {
                if (error) {
                    alert("주문 오류 발생: " + error.message);
                } else if (committed) {
                    const orderNum = snapshot.val(); // 오늘 몇 번째 주문인지 확정된 번호

                    const summary = {};
                    cart.forEach(item => {
                        const key = `${item.name} (${item.option})`;
                        summary[key] = (summary[key] || 0) + 1;
                    });

                    let msg = `🔔 **[새 주문 알림 - 번호: ${orderNum}]**\n🕒 시간: ${timeString}\n----------------\n`;
                    const orderItems = [];
                    for (const [key, count] of Object.entries(summary)) {
                        orderItems.push({ name: key, count: count });
                        msg += `☕ ${key} x ${count}개\n`; 
                    }
                    msg += `----------------\n📦 **총 ${cart.length}잔** / **주문번호: ${orderNum}번**`;

                    const newOrder = {
                        orderNumber: orderNum,
                        time: timeString,
                        items: orderItems,
                        date: dateKey,
                        done: false
                    };

                    db.ref('orders').push(newOrder).then(() => {
                        sendDiscord(msg);
                        alert(`주문이 완료되었습니다! 🚀\n\n오늘의 [ ${orderNum} ] 번째 주문자입니다.`);
                        cart = [];
                        renderCart();
                        toggleCart(false);
                    });
                }
            });
        }

        function sendDiscord(text) {
            const data = {
                content: text,
                username: "영광&마리아 홈카페",
                avatar_url: "https://cdn-icons-png.flaticon.com/512/751/751663.png"
            };
            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(err => console.error("디스코드 실패:", err));
        }
    </script>
</body>
</html>
